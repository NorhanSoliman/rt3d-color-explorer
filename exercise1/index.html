<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PW2 — Ex1: Color Space Point Cloud</title>

  <!-- Import map: resolve bare "three" imports to CDN -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.163.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.163.0/examples/jsm/"
    }
  }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --panel: rgba(12, 12, 20, 0.85);
      --border: rgba(255,255,255,0.08);
      --accent: #7c6aff;
      --accent2: #ff6a9b;
      --text: #e8e8f0;
      --muted: #666680;
      --font: 'IBM Plex Mono', monospace;
    }

    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap');

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      overflow: hidden;
    }

    #canvas-container {
      position: fixed;
      inset: 0;
    }

    canvas { display: block; width: 100% !important; height: 100% !important; }

    /* ── HUD overlay ── */
    #hud {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    /* Top-left: title + image loader */
    #top-left {
      position: absolute;
      top: 24px; left: 24px;
      pointer-events: all;
    }

    .title {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 18px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.01em;
      margin-bottom: 16px;
    }

    .file-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 14px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      font-family: var(--font);
      font-size: 11px;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .file-btn:hover { border-color: var(--accent); color: var(--text); }
    #file-input { display: none; }

    /* Bottom-left: color space switcher */
    #cs-panel {
      position: absolute;
      bottom: 32px; left: 24px;
      pointer-events: all;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .cs-label {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .cs-buttons {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .cs-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      font-family: var(--font);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      backdrop-filter: blur(8px);
      min-width: 160px;
    }
    .cs-btn:hover { border-color: rgba(124,106,255,0.4); color: var(--text); }
    .cs-btn.active {
      border-color: var(--accent);
      color: var(--text);
      background: rgba(124,106,255,0.12);
    }
    .cs-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.15s;
    }
    .cs-btn.active .cs-dot { background: var(--accent); }

    /* Bottom-right: point size + viz mode */
    #controls-panel {
      position: absolute;
      bottom: 32px; right: 24px;
      pointer-events: all;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-width: 180px;
    }

    .ctrl-group { display: flex; flex-direction: column; gap: 8px; }
    .ctrl-label {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .mode-toggle {
      display: flex;
      gap: 4px;
    }
    .mode-btn {
      flex: 1;
      padding: 7px 0;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      font-family: var(--font);
      font-size: 10px;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.15s;
      backdrop-filter: blur(8px);
    }
    .mode-btn:hover { color: var(--text); }
    .mode-btn.active {
      border-color: var(--accent2);
      color: var(--text);
      background: rgba(255,106,155,0.1);
    }

    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      height: 2px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--bg);
    }

    .range-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .range-val {
      font-size: 11px;
      color: var(--text);
      width: 28px;
      text-align: right;
    }

    /* Top-right: XR buttons injected here */
    #xr-buttons {
      position: absolute;
      top: 24px; right: 24px;
      pointer-events: all;
      display: flex;
      gap: 8px;
    }

    /* Stats (top-center) */
    #stats-bar {
      position: absolute;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 24px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 8px 20px;
      backdrop-filter: blur(8px);
      pointer-events: none;
    }
    .stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .stat-val { font-size: 14px; font-weight: 500; color: var(--text); }
    .stat-lbl { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }

    /* Loading overlay */
    #loading {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 100;
      transition: opacity 0.5s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .loading-text {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .loading-bar {
      width: 200px; height: 1px;
      background: var(--border);
      border-radius: 1px;
      overflow: hidden;
    }
    .loading-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.3s;
      animation: loadpulse 1.2s ease-in-out infinite;
    }
    @keyframes loadpulse {
      0%   { width: 0%; margin-left: 0; }
      50%  { width: 60%; margin-left: 20%; }
      100% { width: 0%; margin-left: 100%; }
    }
  </style>
</head>
<body>

<div id="loading">
  <div class="loading-text">Initialising renderer</div>
  <div class="loading-bar"><div class="loading-fill"></div></div>
</div>

<div id="canvas-container"></div>

<div id="hud">

  <!-- Top-left -->
  <div id="top-left">
    <div class="title">PW2 · Exercise 1</div>
    <div class="subtitle">Color Space Explorer</div>
    <label class="file-btn">
      <span>⊕</span> Load Image
      <input type="file" id="file-input" accept="image/*" />
    </label>
  </div>

  <!-- Stats bar -->
  <div id="stats-bar">
    <div class="stat">
      <span class="stat-val" id="stat-points">—</span>
      <span class="stat-lbl">Points</span>
    </div>
    <div class="stat">
      <span class="stat-val" id="stat-res">—</span>
      <span class="stat-lbl">Resolution</span>
    </div>
    <div class="stat">
      <span class="stat-val" id="stat-space">RGB</span>
      <span class="stat-lbl">Space</span>
    </div>
  </div>

  <!-- XR buttons (populated by main.js) -->
  <div id="xr-buttons"></div>

  <!-- Color space switcher -->
  <div id="cs-panel">
    <div class="cs-label">Color Space</div>
    <div class="cs-buttons">
      <button class="cs-btn active" data-space="0"><span class="cs-dot"></span>RGB</button>
      <button class="cs-btn"        data-space="1"><span class="cs-dot"></span>HSV</button>
      <button class="cs-btn"        data-space="2"><span class="cs-dot"></span>CIE XYZ</button>
      <button class="cs-btn"        data-space="3"><span class="cs-dot"></span>CIE xyY</button>
      <button class="cs-btn"        data-space="4"><span class="cs-dot"></span>CIELAB</button>
      <button class="cs-btn"        data-space="5"><span class="cs-dot"></span>CIELCH</button>
    </div>
  </div>

  <!-- Right-side controls -->
  <div id="controls-panel">

    <div class="ctrl-group">
      <div class="ctrl-label">Visualisation Mode</div>
      <div class="mode-toggle">
        <button class="mode-btn active" data-mode="0">Direct</button>
        <button class="mode-btn"        data-mode="1">Density</button>
      </div>
    </div>

    <div class="ctrl-group">
      <div class="ctrl-label">Point Size</div>
      <div class="range-row">
        <input type="range" id="pt-size" min="1" max="10" step="0.5" value="2" />
        <span class="range-val" id="pt-size-val">2</span>
      </div>
    </div>

    <div class="ctrl-group">
      <div class="ctrl-label">Opacity</div>
      <div class="range-row">
        <input type="range" id="pt-opacity" min="0.05" max="1" step="0.05" value="0.8" />
        <span class="range-val" id="pt-opacity-val">0.8</span>
      </div>
    </div>

  </div>

</div>

<!-- App entry point -->
<script type="module" src="main.js"></script>

</body>
</html>
