<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PW2 — Ex2: Color Elevation Maps</title>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.163.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.163.0/examples/jsm/"
    }
  }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #08080d;
      --panel:   rgba(10,10,18,0.88);
      --border:  rgba(255,255,255,0.07);
      --accent:  #00c9a7;   /* teal — different from Ex1 purple */
      --accent2: #ff8c42;
      --text:    #dde8e4;
      --muted:   #556060;
      --font:    'IBM Plex Mono', monospace;
    }

    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap');

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      overflow: hidden;
    }

    #canvas-container { position: fixed; inset: 0; }
    canvas { display: block; width: 100% !important; height: 100% !important; }

    /* ── HUD ── */
    #hud {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    /* Top-left */
    #top-left {
      position: absolute;
      top: 24px; left: 24px;
      pointer-events: all;
    }
    .title   { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
    .subtitle{ font-size: 18px; font-weight: 500; color: var(--text); margin-bottom: 16px; }

    .file-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 7px 14px;
      background: var(--panel); border: 1px solid var(--border); border-radius: 4px;
      color: var(--muted); font-family: var(--font); font-size: 11px; letter-spacing: 0.1em;
      cursor: pointer; transition: border-color 0.2s, color 0.2s;
    }
    .file-btn:hover { border-color: var(--accent); color: var(--text); }
    #file-input { display: none; }

    /* Stats bar */
    #stats-bar {
      position: absolute; top: 24px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 24px;
      background: var(--panel); border: 1px solid var(--border); border-radius: 4px;
      padding: 8px 20px; backdrop-filter: blur(8px); pointer-events: none;
    }
    .stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .stat-val { font-size: 14px; font-weight: 500; color: var(--text); }
    .stat-lbl { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }

    /* XR buttons */
    #xr-buttons {
      position: absolute; top: 24px; right: 24px;
      pointer-events: all; display: flex; gap: 8px;
    }

    /* Left panel: color space + channel */
    #left-panel {
      position: absolute; bottom: 32px; left: 24px;
      pointer-events: all; display: flex; flex-direction: column; gap: 20px;
    }

    .panel-section { display: flex; flex-direction: column; gap: 6px; }
    .panel-label {
      font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted);
    }

    .btn-grid { display: flex; flex-direction: column; gap: 4px; }

    .cs-btn, .ch-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 14px;
      background: var(--panel); border: 1px solid var(--border); border-radius: 4px;
      color: var(--muted); font-family: var(--font); font-size: 11px;
      cursor: pointer; transition: all 0.15s; backdrop-filter: blur(8px);
      min-width: 150px;
    }
    .cs-btn:hover, .ch-btn:hover { border-color: rgba(0,201,167,0.4); color: var(--text); }
    .cs-btn.active, .ch-btn.active {
      border-color: var(--accent); color: var(--text);
      background: rgba(0,201,167,0.1);
    }
    .btn-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--muted); transition: background 0.15s; flex-shrink: 0;
    }
    .cs-btn.active .btn-dot, .ch-btn.active .btn-dot { background: var(--accent); }

    /* Right panel: controls */
    #right-panel {
      position: absolute; bottom: 32px; right: 24px;
      pointer-events: all; display: flex; flex-direction: column; gap: 18px;
      min-width: 190px;
    }

    .ctrl-group { display: flex; flex-direction: column; gap: 8px; }
    .ctrl-label { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }

    .range-row { display: flex; align-items: center; gap: 10px; }
    .range-val  { font-size: 11px; color: var(--text); width: 32px; text-align: right; }

    input[type=range] {
      -webkit-appearance: none; width: 100%; height: 2px;
      background: var(--border); border-radius: 2px; outline: none; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 12px; height: 12px;
      border-radius: 50%; background: var(--accent); border: 2px solid var(--bg);
    }

    .wire-toggle {
      display: flex; gap: 4px;
    }
    .wire-btn {
      flex: 1; padding: 7px 0;
      background: var(--panel); border: 1px solid var(--border); border-radius: 4px;
      color: var(--muted); font-family: var(--font); font-size: 10px; letter-spacing: 0.1em;
      cursor: pointer; transition: all 0.15s; backdrop-filter: blur(8px);
    }
    .wire-btn:hover { color: var(--text); }
    .wire-btn.active {
      border-color: var(--accent2); color: var(--text);
      background: rgba(255,140,66,0.1);
    }

    /* Loading */
    #loading {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
      z-index: 100; transition: opacity 0.5s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .loading-text { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }
    .loading-bar  { width: 200px; height: 1px; background: var(--border); border-radius: 1px; overflow: hidden; }
    .loading-fill { height: 100%; background: var(--accent); animation: loadpulse 1.2s ease-in-out infinite; }
    @keyframes loadpulse {
      0%   { width: 0%;  margin-left: 0; }
      50%  { width: 60%; margin-left: 20%; }
      100% { width: 0%;  margin-left: 100%; }
    }
  </style>
</head>
<body>

<div id="loading">
  <div class="loading-text">Building heightfield</div>
  <div class="loading-bar"><div class="loading-fill"></div></div>
</div>

<div id="canvas-container"></div>

<div id="hud">

  <!-- Top-left: title + file loader -->
  <div id="top-left">
    <div class="title">PW2 · Exercise 2</div>
    <div class="subtitle">Color Elevation Maps</div>
    <label class="file-btn">
      <span>⊕</span> Load Image
      <input type="file" id="file-input" accept="image/*" />
    </label>
  </div>

  <!-- Stats -->
  <div id="stats-bar">
    <div class="stat">
      <span class="stat-val" id="stat-res">—</span>
      <span class="stat-lbl">Grid</span>
    </div>
    <div class="stat">
      <span class="stat-val" id="stat-space">RGB</span>
      <span class="stat-lbl">Space</span>
    </div>
    <div class="stat">
      <span class="stat-val" id="stat-channel">R</span>
      <span class="stat-lbl">Channel</span>
    </div>
  </div>

  <!-- XR -->
  <div id="xr-buttons"></div>

  <!-- Left panel -->
  <div id="left-panel">

    <!-- Color space -->
    <div class="panel-section">
      <div class="panel-label">Color Space</div>
      <div class="btn-grid" id="cs-buttons">
        <button class="cs-btn active" data-space="0"><span class="btn-dot"></span>RGB</button>
        <button class="cs-btn"        data-space="1"><span class="btn-dot"></span>HSV</button>
        <button class="cs-btn"        data-space="2"><span class="btn-dot"></span>CIE XYZ</button>
        <button class="cs-btn"        data-space="3"><span class="btn-dot"></span>CIE xyY</button>
        <button class="cs-btn"        data-space="4"><span class="btn-dot"></span>CIELAB</button>
        <button class="cs-btn"        data-space="5"><span class="btn-dot"></span>CIELCH</button>
      </div>
    </div>

    <!-- Channel (updates dynamically based on selected space) -->
    <div class="panel-section">
      <div class="panel-label">Height Channel</div>
      <div class="btn-grid" id="ch-buttons">
        <!-- populated by ui.js -->
      </div>
    </div>

  </div>

  <!-- Right panel -->
  <div id="right-panel">

    <div class="ctrl-group">
      <div class="ctrl-label">Surface Mode</div>
      <div class="wire-toggle">
        <button class="wire-btn active" data-wire="0">Solid</button>
        <button class="wire-btn"        data-wire="1">Wire</button>
        <button class="wire-btn"        data-wire="2">Both</button>
      </div>
    </div>

    <div class="ctrl-group">
      <div class="ctrl-label">Height Scale</div>
      <div class="range-row">
        <input type="range" id="height-scale" min="0.05" max="1.5" step="0.05" value="0.4" />
        <span class="range-val" id="height-scale-val">0.40</span>
      </div>
    </div>

    <div class="ctrl-group">
      <div class="ctrl-label">Grid Resolution</div>
      <div class="range-row">
        <input type="range" id="grid-res" min="32" max="256" step="16" value="128" />
        <span class="range-val" id="grid-res-val">128</span>
      </div>
    </div>

  </div>

</div>

<script type="module" src="main.js"></script>
</body>
</html>
